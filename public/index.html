<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reimbursements Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0b0f19;
      --bg-secondary: rgba(255, 255, 255, 0.03);
      --border-color: rgba(255, 255, 255, 0.08);
      --accent-color: #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.15);
      --text-primary: #f3f4f6;
      --text-secondary: #9ca3af;
      --success: #10b981;
      --danger: #ef4444;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(6, 182, 212, 0.05) 0%, transparent 40%);
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa 0%, #6366f1 50%, #06b6d4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    header p {
      color: var(--text-secondary);
      font-size: 1rem;
    }

    .container {
      width: 100%;
      max-width: 1000px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
    }

    @media (min-width: 768px) {
      .container {
        grid-template-columns: 350px 1fr;
      }
    }

    .card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 1.5rem;
      backdrop-filter: blur(12px);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
    }

    .card h2 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 1.25rem;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .input-group {
      margin-bottom: 1rem;
    }

    .input-group label {
      display: block;
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }

    .input-group input, .input-group select, .input-group textarea {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 0.75rem;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.2s ease;
    }

    .input-group input:focus, .input-group select:focus, .input-group textarea:focus {
      border-color: var(--accent-color);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    button {
      width: 100%;
      background: var(--accent-color);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.75rem;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover {
      background: #4f46e5;
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.08);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .hidden {
      display: none !important;
    }

    .session-badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.8rem;
      font-weight: 600;
      background: var(--accent-glow);
      color: #a5b4fc;
      margin-top: 0.5rem;
    }

    .list-container {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .list-item {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.2s ease;
    }

    .list-item:hover {
      border-color: rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.04);
    }

    .list-item-details h3 {
      font-size: 1rem;
      margin-bottom: 0.25rem;
    }

    .list-item-details p {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .status {
      padding: 0.25rem 0.5rem;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .status-pending { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }
    .status-approved { background: rgba(16, 185, 129, 0.1); color: var(--success); }
    .status-rejected { background: rgba(239, 68, 68, 0.1); color: var(--danger); }

    .action-buttons {
      display: flex;
      gap: 0.5rem;
    }

    .btn-action {
      padding: 0.4rem 0.8rem;
      font-size: 0.8rem;
      border-radius: 6px;
      width: auto;
    }

    .btn-approve { background: var(--success); }
    .btn-approve:hover { background: #059669; }
    .btn-reject { background: var(--danger); }
    .btn-reject:hover { background: #dc2626; }

    .alert {
      padding: 0.75rem;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-bottom: 1rem;
      display: none;
    }

    .alert-error {
      background: rgba(239, 68, 68, 0.1);
      color: var(--danger);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .alert-success {
      background: rgba(16, 185, 129, 0.1);
      color: var(--success);
      border: 1px solid rgba(16, 185, 129, 0.2);
    }
  </style>
</head>
<body>

  <header>
    <h1>Reimbursements Hub</h1>
    <p>Role-Based Expense Management Portal</p>
  </header>

  <div class="container">
    <!-- Sidebar Controls -->
    <div class="sidebar flex flex-col gap-8">
      <!-- Onboarding Card -->
      <div id="auth-card" class="card">
        <h2>Authentication</h2>
        <div id="auth-alert" class="alert alert-error"></div>
        
        <div id="login-form">
          <div class="input-group">
            <label for="login-email">Email Address</label>
            <input type="email" id="login-email" placeholder="user@org.com">
          </div>
          <div class="input-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" placeholder="••••••••">
          </div>
          <button onclick="login()">Login</button>
          <p style="text-align: center; font-size: 0.85rem; margin-top: 1rem; color: var(--text-secondary);">
            Don't have an account? <a href="#" onclick="toggleAuth(false)" style="color: var(--accent-color);">Register</a>
          </p>
        </div>

        <div id="register-form" class="hidden">
          <div class="input-group">
            <label for="reg-name">Full Name</label>
            <input type="text" id="reg-name" placeholder="John Doe">
          </div>
          <div class="input-group">
            <label for="reg-email">Email Address</label>
            <input type="email" id="reg-email" placeholder="user@org.com">
          </div>
          <div class="input-group">
            <label for="reg-password">Password</label>
            <input type="password" id="reg-password" placeholder="••••••••">
          </div>
          <button onclick="register()">Register</button>
          <p style="text-align: center; font-size: 0.85rem; margin-top: 1rem; color: var(--text-secondary);">
            Already have an account? <a href="#" onclick="toggleAuth(true)" style="color: var(--accent-color);">Login</a>
          </p>
        </div>
      </div>

      <!-- User Session Card -->
      <div id="session-card" class="card hidden">
        <h2>Active Session</h2>
        <div style="margin-bottom: 1.5rem;">
          <h3 id="session-name" style="font-weight: 500;">Name</h3>
          <p id="session-email" style="font-size: 0.85rem; color: var(--text-secondary);">email@org.com</p>
          <div id="session-role" class="session-badge">ROLE</div>
        </div>
        <button class="btn-secondary" onclick="logout()">Logout</button>
      </div>

      <!-- CFO Settings Panel -->
      <div id="cfo-panel" class="card hidden">
        <h2>CFO Console</h2>
        <div id="cfo-alert" class="alert"></div>
        
        <div class="input-group">
          <label for="assign-user">User ID</label>
          <input type="text" id="assign-user" placeholder="UUID">
        </div>
        <div class="input-group">
          <label for="assign-role">Assign Role</label>
          <select id="assign-role">
            <option value="EMP">Employee (EMP)</option>
            <option value="RM">Reporting Manager (RM)</option>
            <option value="APE">Associate Partner (APE)</option>
          </select>
        </div>
        <button onclick="assignRole()" style="margin-bottom: 1.5rem;">Assign Role</button>

        <hr style="border: 0; border-top: 1px solid var(--border-color); margin-bottom: 1.5rem;">

        <div class="input-group">
          <label for="assign-emp-id">Employee ID</label>
          <input type="text" id="assign-emp-id" placeholder="Employee UUID">
        </div>
        <div class="input-group">
          <label for="assign-mgr-id">Reporting Manager ID</label>
          <input type="text" id="assign-mgr-id" placeholder="Manager UUID">
        </div>
        <button onclick="assignManager()">Assign Manager</button>
      </div>
    </div>

    <!-- Main Workspace Content -->
    <div class="main-content">
      <!-- Submit Reimbursement (Only for EMP) -->
      <div id="raise-card" class="card hidden" style="margin-bottom: 2rem;">
        <h2>Submit Reimbursement Request</h2>
        <div id="raise-alert" class="alert"></div>
        <div style="display: grid; grid-template-columns: 1fr 150px; gap: 1rem;">
          <div class="input-group">
            <label for="reimb-title">Title</label>
            <input type="text" id="reimb-title" placeholder="Conference Flights">
          </div>
          <div class="input-group">
            <label for="reimb-amount">Amount ($)</label>
            <input type="number" step="0.01" id="reimb-amount" placeholder="0.00">
          </div>
        </div>
        <div class="input-group">
          <label for="reimb-desc">Description</label>
          <textarea id="reimb-desc" rows="3" placeholder="Details about this claim..."></textarea>
        </div>
        <button onclick="submitReimbursement()">Submit Request</button>
      </div>

      <!-- Reimbursements Listing -->
      <div id="list-card" class="card hidden">
        <h2 style="justify-content: space-between;">
          <span>Reimbursements Claims</span>
          <button onclick="loadReimbursements()" class="btn-secondary btn-action" style="width: auto; padding: 0.25rem 0.75rem;">Refresh</button>
        </h2>
        <div id="reimbursement-list" class="list-container">
          <p style="color: var(--text-secondary); text-align: center;">No claims submitted yet.</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentUser = null;

    function toggleAuth(showLogin) {
      document.getElementById('login-form').classList.toggle('hidden', !showLogin);
      document.getElementById('register-form').classList.toggle('hidden', showLogin);
      document.getElementById('auth-alert').style.display = 'none';
    }

    function showAlert(id, text, isError = true) {
      const el = document.getElementById(id);
      el.innerText = text;
      el.className = `alert ${isError ? 'alert-error' : 'alert-success'}`;
      el.style.display = 'block';
    }

    async function login() {
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const alertId = 'auth-alert';

      try {
        const res = await fetch('/rest/onboardings/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (data.status === 'success') {
          currentUser = data.data;
          updateUI();
        } else {
          showAlert(alertId, data.message || 'Login failed');
        }
      } catch (err) {
        showAlert(alertId, 'Network error occurred');
      }
    }

    async function register() {
      const name = document.getElementById('reg-name').value;
      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-password').value;
      const alertId = 'auth-alert';

      try {
        const res = await fetch('/rest/onboardings/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });
        const data = await res.json();
        if (data.status === 'success') {
          showAlert(alertId, 'Account registered! Please log in.', false);
          toggleAuth(true);
        } else {
          showAlert(alertId, data.message || 'Registration failed');
        }
      } catch (err) {
        showAlert(alertId, 'Network error occurred');
      }
    }

    async function logout() {
      await fetch('/rest/onboardings/logout', { method: 'POST' });
      currentUser = null;
      updateUI();
    }

    function updateUI() {
      if (currentUser) {
        document.getElementById('auth-card').classList.add('hidden');
        document.getElementById('session-card').classList.remove('hidden');
        document.getElementById('session-name').innerText = currentUser.name;
        document.getElementById('session-email').innerText = currentUser.email;
        document.getElementById('session-role').innerText = currentUser.role;

        document.getElementById('list-card').classList.remove('hidden');

        if (currentUser.role === 'CFO') {
          document.getElementById('cfo-panel').classList.remove('hidden');
        } else {
          document.getElementById('cfo-panel').classList.add('hidden');
        }

        if (currentUser.role === 'EMP') {
          document.getElementById('raise-card').classList.remove('hidden');
        } else {
          document.getElementById('raise-card').classList.add('hidden');
        }

        loadReimbursements();
      } else {
        document.getElementById('auth-card').classList.remove('hidden');
        document.getElementById('session-card').classList.add('hidden');
        document.getElementById('cfo-panel').classList.add('hidden');
        document.getElementById('raise-card').classList.add('hidden');
        document.getElementById('list-card').classList.add('hidden');
      }
    }

    async function assignRole() {
      const userId = document.getElementById('assign-user').value;
      const role = document.getElementById('assign-role').value;
      const alertId = 'cfo-alert';

      try {
        const res = await fetch('/rest/roles/assign', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId, role })
        });
        const data = await res.json();
        showAlert(alertId, data.message || 'Updated', data.status !== 'success');
      } catch (err) {
        showAlert(alertId, 'Network error');
      }
    }

    async function assignManager() {
      const employeeId = document.getElementById('assign-emp-id').value;
      const managerId = document.getElementById('assign-mgr-id').value;
      const alertId = 'cfo-alert';

      try {
        const res = await fetch('/rest/employees/assign', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ employeeId, managerId })
        });
        const data = await res.json();
        showAlert(alertId, data.message || 'Updated', data.status !== 'success');
      } catch (err) {
        showAlert(alertId, 'Network error');
      }
    }

    async function submitReimbursement() {
      const title = document.getElementById('reimb-title').value;
      const amount = document.getElementById('reimb-amount').value;
      const description = document.getElementById('reimb-desc').value;
      const alertId = 'raise-alert';

      try {
        const res = await fetch('/rest/reimbursements', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, amount, description })
        });
        const data = await res.json();
        if (data.status === 'success') {
          showAlert(alertId, 'Claim raised successfully!', false);
          document.getElementById('reimb-title').value = '';
          document.getElementById('reimb-amount').value = '';
          document.getElementById('reimb-desc').value = '';
          loadReimbursements();
        } else {
          showAlert(alertId, data.message || 'Failed to submit');
        }
      } catch (err) {
        showAlert(alertId, 'Network error');
      }
    }

    async function makeDecision(reimbursementId, status) {
      try {
        const res = await fetch('/rest/reimbursements', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ reimbursementId, status })
        });
        loadReimbursements();
      } catch (err) {
        console.error(err);
      }
    }

    async function loadReimbursements() {
      const listEl = document.getElementById('reimbursement-list');
      try {
        const res = await fetch('/rest/reimbursements');
        const data = await res.json();
        if (data.status === 'success' && data.data && data.data.reimbursements) {
          const rems = data.data.reimbursements;
          if (rems.length === 0) {
            listEl.innerHTML = `<p style="color: var(--text-secondary); text-align: center;">No claims found.</p>`;
            return;
          }

          listEl.innerHTML = rems.map(r => `
            <div class="list-item">
              <div class="list-item-details">
                <h3>${r.title}</h3>
                <p>${r.description}</p>
                <p style="margin-top: 0.25rem; font-size: 0.8rem; color: #fff;">Amount: $${r.amount}</p>
                ${r.employeeId ? `<p style="font-size: 0.75rem;">Owner ID: ${r.employeeId}</p>` : ''}
              </div>
              <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 0.5rem;">
                <span class="status status-${r.status.toLowerCase()}">${r.status}</span>
                ${currentUser.role !== 'EMP' && r.status === 'PENDING' ? `
                  <div class="action-buttons">
                    <button class="btn-action btn-approve" onclick="makeDecision('${r.id}', 'APPROVED')">Approve</button>
                    <button class="btn-action btn-reject" onclick="makeDecision('${r.id}', 'REJECTED')">Reject</button>
                  </div>
                ` : ''}
              </div>
            </div>
          `).join('');
        }
      } catch (err) {
        listEl.innerHTML = `<p style="color: var(--danger); text-align: center;">Failed to load claims.</p>`;
      }
    }
  </script>
</body>
</html>
